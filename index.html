<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up · Modern Form</title>
    <style>
        /* RESET & BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
            color: #1e293b;
            background-color: #f8fafc;
            height: 100vh;
            display: flex;
        }

        /* MAIN SPLIT LAYOUT */
        .split-screen {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* LEFT PANEL – IMAGE */
        .form-image {
            flex: 1.2; /* slightly wider than right panel – adjust as needed */
            background-color: #2b3e4f; /* fallback */
            overflow: hidden;
        }

        .form-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* RIGHT PANEL – FORM */
        .form-panel {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 3rem 2.5rem;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.05);
            overflow-y: auto;
        }

        /* HERO TEXT (exactly as described) */
        .hero-text p {
            font-size: 1.3rem;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .hero-text p em {
            font-style: italic;
            color: #2c5f2d; /* subtle green accent */
        }

        .hero-text br {
            display: none; /* use margins for spacing */
        }

        /* LET'S DO THIS! */
        .hero-text p strong {
            display: block;
            font-size: 1.5rem;
            font-weight: 700;
            margin: 1.5rem 0 0.5rem;
            color: #163a24;
        }

        /* FORM */
        .signup-form {
            margin-top: 1rem;
        }

        /* TWO‑COLUMN GRID FOR FIELDS */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem 1.8rem;
            margin-bottom: 2rem;
        }

        .form-field {
            display: flex;
            flex-direction: column;
        }

        .form-field label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #4a5a6e;
            margin-bottom: 0.25rem;
        }

        .form-field input {
            padding: 0.7rem 0.9rem;
            border: 1px solid #d1d9e6;
            border-radius: 8px;
            font-size: 1rem;
            transition: border 0.2s, box-shadow 0.2s;
            background-color: #f9fbfd;
        }

        .form-field input:focus {
            outline: none;
            border-color: #2c5f2d;
            box-shadow: 0 0 0 3px rgba(44, 95, 45, 0.15);
            background-color: white;
        }

        .form-field input::placeholder {
            color: #9aa9b9;
            font-weight: 300;
            font-size: 0.95rem;
        }

        /* CREATE ACCOUNT BUTTON */
        .create-btn {
            background-color: #2c5f2d;   /* deep green – matches “real” vibe */
            color: white;
            border: none;
            border-radius: 10px;
            padding: 1rem 1.5rem;
            font-size: 1.2rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 30, 0, 0.2);
        }

        .create-btn:hover {
            background-color: #1f4520;
            transform: scale(1.02);
        }

        .create-btn:active {
            transform: scale(0.98);
        }

        /* LOGIN LINK */
        .login-text {
            text-align: center;
            font-size: 1rem;
            color: #2d3a4a;
        }

        .login-text a {
            color: #2c5f2d;
            font-weight: 600;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .login-text a:hover {
            border-bottom-color: #2c5f2d;
        }

        /* MOBILE STACKING */
        @media (max-width: 800px) {
            .split-screen {
                flex-direction: column;
            }
            .form-image {
                flex: 0 0 250px;
            }
            .form-panel {
                padding: 2rem 1.5rem;
            }
            .form-grid {
                gap: 1rem;
            }
        }

        @media (max-width: 500px) {
            .form-grid {
                grid-template-columns: 1fr; /* stack on very small screens */
            }
        }
    </style>
</head>
<body>
    <div class="split-screen">
        <!-- LEFT: IMAGE (exactly your img tag) -->
        <div class="form-image">
            <img src="https://images.unsplash.com/photo-1585202900225-6d3ac20a6962?q=80&w=987&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="lush green leaves by Halie West">
        </div>

        <!-- RIGHT: TEXT + FORM -->
        <div class="form-panel">
            <div class="hero-text">
                <p>
                    This is not a real online service! You know you need something like this in your life to help you realise your deepest dreams. <br> Sign up <em>now</em> to get started.
                </p>
                <p style="margin: 1.5rem 0 0.2rem; font-weight: 500;">You know you want to.</p>
                <p style="font-size: 1.8rem; font-weight: 700; color: #163a24; margin: 0.2rem 0 2rem;">Let's do this!</p>
            </div>

            <form class="signup-form" action="#" method="post">
                <div class="form-grid">
                    <!-- FIRST NAME -->
                    <div class="form-field">
                        <label for="fname">FIRST NAME</label>
                        <input type="text" id="fname" name="fname" placeholder="Thor" required>
                    </div>
                    <!-- LAST NAME (with “Odinson” placeholder) -->
                    <div class="form-field">
                        <label for="lname">LAST NAME</label>
                        <input type="text" id="lname" name="lname" placeholder="Odinson" required>
                    </div>
                    <!-- EMAIL -->
                    <div class="form-field">
                        <label for="email">EMAIL</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required>
                    </div>
                    <!-- PHONE NUMBER -->
                    <div class="form-field">
                        <label for="phone">PHONE NUMBER</label>
                        <input type="tel" id="phone" name="phone" placeholder="+1 234 567 890">
                    </div>
                    <!-- PASSWORD -->
                    <div class="form-field">
                        <label for="password">PASSWORD</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                    <!-- CONFIRM PASSWORD -->
                    <div class="form-field">
                        <label for="confirm">CONFIRM PASSWORD</label>
                        <input type="password" id="confirm" name="confirm" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="create-btn">Create Account</button>

                <p class="login-text">Already have an account? <a href="login.html">Log in</a></p>
            </form>
        </div>
    </div>
</body>
</html>
